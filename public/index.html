<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="./img/icon.png">

<!-- Bootstrap -->
<link rel="stylesheet" href="./css/bootstrap/css/bootstrap.min.css">

<!-- Remix Icons -->
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

<title>Login DISP</title>

<style>

/* FUNDO */
body {
    height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;

    background: 
        linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
        url("./img/background.jpg");

    background-size: cover;
    background-position: center;
}

/* CONTAINER */
.container-login{
    display: flex;
    width: 90%;
    max-width: 950px;
    height: 520px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
}

/* LOGIN */
.login-card{
    width: 50%;
    padding: 40px;
    background: #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.login-card h2{
    text-align: center;
    margin-bottom: 25px;
}

/* RECUPERAÇÃO */
.recuperacao-card{
    width: 50%;
    background: 
        linear-gradient(rgba(0, 0, 0, 0.144), rgba(0, 0, 0, 0.116)),
        url("./img/background.jpg");

    background-size: cover;
    background-position: center;

    display: flex;
    align-items: center;
    justify-content: center;
}

/* TEXTO SOBRE IMAGEM */
.overlay{
    color: #fff;
    text-align: center;
    width: 80%;
}

/* ÍCONE OLHO */
.toggle-password{
    position: absolute;
    right: 15px;
    top: 18px;
    cursor: pointer;
    font-size: 18px;
}

/* BOTÕES */
.btn-primary{
    background: #ce8600;
    border: none;
}

.btn-primary:hover{
    background: #c47602;
}

.btn-dark{
    background: #2F2F2F;
}

/* CAIXA TRANSPARENTE */
.glass-box{
    width: 100%;
    padding: 25px;
    border-radius: 12px;

    background: rgba(255, 255, 255, 0.15); /* transparência */
    -webkit-backdrop-filter: blur(10px); /* efeito vidro */
    backdrop-filter: blur(10px);

    border: 1px solid rgba(255,255,255,0.2);

    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Inputs dentro do glass */
.glass-box .form-control{
    background: rgba(255,255,255,0.9);
}

/* Label */
.glass-box label{
    color: #333;
}

/* RESPONSIVO */
@media (max-width: 768px){
    .container-login{
        flex-direction: column;
        height: auto;
    }

    .login-card,
    .recuperacao-card{
        width: 100%;
    }
}

</style>
</head>

<body>

<div class="container-login">

  <!-- LOGIN -->
  <div class="login-card">

    <h2>Bem-vindo de volta</h2>

    <form id="formLogin">

      <!-- MATRÍCULA -->
      <div class="form-floating mb-3">
        <input 
          type="text" 
          name="username"
          class="form-control"
          id="matricula"
          placeholder="Matrícula"
          autocomplete="username"
          required>
        <label for="matricula">
          <i class="ri-user-line"></i> Matrícula
        </label>
      </div>

      <!-- SENHA -->
      <div class="form-floating mb-3 position-relative">
        <input 
          type="password" 
          name="password"
          id="senha"
          class="form-control"
          placeholder="Senha"
          autocomplete="current-password"
          required>

        <label for="senha">
          <i class="ri-lock-line"></i> Senha
        </label>

        <i class="ri-eye-line toggle-password" onclick="toggleSenha()"></i>
      </div>

      <!-- BOTÃO LOGIN -->
      <button class="btn btn-primary w-100 mb-3" type="submit">
        Entrar
      </button>

      <!-- OU -->
      <div class="text-center mb-3">
        <small>OU</small>
      </div>

      <!-- MICROSOFT -->
      <button type="button" class="btn btn-dark w-100" id="loginMicrosoft">
        <i class="ri-microsoft-fill"></i> Entrar com Microsoft
      </button>

    </form>

  </div>

  <!-- RECUPERAÇÃO -->
  <div class="recuperacao-card">

    <div class="overlay">
  
  <div class="glass-box">

    <h3>Esqueceu sua matrícula?</h3>

    <div class="form-floating mb-3">
      <input type="text" class="form-control" id="cpf" placeholder="CPF">
      <label for="cpf">
        <i class="ri-id-card-line"></i> CPF
      </label>
    </div>

    <button class="btn btn-light w-100" id="btnBuscarCPF">
      Buscar usuário
    </button>

    <p id="resultadoCPF" class="mt-3"></p>

  </div>

</div>

  </div>

</div>

<script src="./js/login.js"></script>
<script src="./js/loader.js"></script>

</body>
</html>
