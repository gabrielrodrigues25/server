<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="icon" href="../../img/icon.png">
    <title>Produtos</title>
<!-- Bootstrap -->
<link rel="stylesheet" href="../../Bootstrap/css/bootstrap.min.css">
</head>
<body>

<!-- Navbar -->
<div id="navbar"></div>

<div class="container mt-4">
    <!-- TÍTULO -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="card text-center p-3">
                <h1>Produtos</h1>
            </div>
        </div>
    </div>

<div class="card p-3 mb-3">

<!-- FILTROS -->
<div class="row g-2">

<div class="col-md-3 col-12">
<select id="filtroRede" class="form-select">
<option value="">Todas as redes</option>
</select>
</div>

<div class="col-md-3 col-12">
<select id="filtroLoja" class="form-select">
<option value="">Todas as lojas</option>
</select>
</div>

<div class="col-md-3 col-12">
<select id="filtroProdutos" class="form-select">
<option value="">Todos os produtos</option>
</select>
</div>

<div class="col-md-3 col-12 d-flex gap-2">
<button id="carregarTab" class="btn btn-warning w-100">Buscar</button>
<button id="abrirNovo" class="btn btn-success w-100">Novo</button>
</div>

</div>
</div>

<!-- FORM NOVO PRODUTO -->
<div id="formNovo" style="display:none;" class="mb-4">

<div class="row g-2">

<h4>Cadastrar Produto</h4>

<div class="col-md-3 col-12">
<input type="text" id="loja" class="form-control" placeholder="Loja">
</div>

<div class="col-md-3 col-12">
<input type="number" id="cliente" class="form-control" placeholder="Cliente">
</div>

<div class="col-md-3 col-12">
<input type="number" id="codigo_parceiro" class="form-control" placeholder="Código parceiro">
</div>

<div class="col-md-3 col-12">
<input type="number" id="material" class="form-control" placeholder="Material">
</div>

<div class="col-md-3 col-12">
<input type="number" id="ean" class="form-control" placeholder="EAN">
</div>

<div class="col-md-3 col-12">
<input type="text" id="descricao" class="form-control" placeholder="Descrição">
</div>

<div class="col-md-3 col-12">
<input type="text" id="un_med" class="form-control" placeholder="Un Med">
</div>

<div class="col-md-3 col-12">
<input type="number" id="un" class="form-control" placeholder="Un">
</div>

<div class="col-md-3 col-12">
<input type="number" id="qtd_cx" class="form-control" placeholder="Qtd caixa">
</div>

<div class="col-md-3 col-12">
<input type="text" id="situacao" class="form-control" placeholder="Situação">
</div>

<div class="col-12">
<button id="salvarNovo" class="btn btn-success">Salvar</button>
</div>

</div>

</div>

<!-- TABELA -->
<div class="card p-3">

<div class="table-responsive">

<table class="tabela-dados">

<thead>
<tr id="thead"></tr>
</thead>

<tbody id="tbody"></tbody>

</table>

</div>

</div>

</div>

<!-- LOADER -->
<div id="loaderGlobal" class="loader-global" style="display:none;">
  <div class="loader-box">
    <div class="spinner"></div>
    <span>Carregando...</span>
  </div>
</div>

<script src="../../js/config.js"></SCript>
<script src="../../Bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="../../js/navbar.js"></script>
<script src="../../js/loader.js"></script>
<script src="../../js/produtos.js"></script>
</body>
</html>
